name: Tag Release

on:
  push:
    branches:
      - master

permissions:
  contents: write
  actions: write

jobs:
  tag:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Resolve release tag state
        id: release
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG="v$VERSION"

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          if git rev-parse HEAD^ >/dev/null 2>&1; then
            PREVIOUS_VERSION=$(
              git show HEAD^:package.json | node -e "let s='';process.stdin.on('data',d=>s+=d);process.stdin.on('end',()=>console.log(JSON.parse(s).version))"
            )
          else
            PREVIOUS_VERSION=''
          fi

          if [ "$PREVIOUS_VERSION" = "$VERSION" ]; then
            echo "version_changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "version_changed=true" >> "$GITHUB_OUTPUT"
          fi

          git fetch --tags --force

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "tag_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "tag_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create and push tag
        if: steps.release.outputs.version_changed == 'true' && steps.release.outputs.tag_exists != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.release.outputs.tag }}" -m "Release ${{ steps.release.outputs.tag }}"
          git push origin "${{ steps.release.outputs.tag }}"

      - name: Trigger publish workflow
        if: steps.release.outputs.version_changed == 'true' && steps.release.outputs.tag_exists != 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run publish-mac-release.yml \
            --repo "$GITHUB_REPOSITORY" \
            --ref master \
            -f tag="${{ steps.release.outputs.tag }}"

      - name: Skip reason
        if: steps.release.outputs.version_changed != 'true' || steps.release.outputs.tag_exists == 'true'
        run: |
          echo "version_changed=${{ steps.release.outputs.version_changed }}"
          echo "tag_exists=${{ steps.release.outputs.tag_exists }}"
          echo "No release tag created for this push."
