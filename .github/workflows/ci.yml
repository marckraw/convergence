name: CI

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Require changeset on PRs
        if: github.event_name == 'pull_request' && !startsWith(github.head_ref, 'changeset-release/')
        run: npx changeset status --since=origin/master

      - name: Run pure tests
        run: npm run test:pure

      - name: Run unit tests
        run: npm run test:unit

      - name: Run chaperone
        run: chaperone check --fix

      - name: Run typecheck
        run: npm run typecheck
