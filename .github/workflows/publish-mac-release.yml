name: Publish Mac Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: Release tag to publish (for example v0.1.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="$GITHUB_REF_NAME"
          fi

          if [ -z "$TAG" ]; then
            echo "Release tag is required."
            exit 1
          fi

          if [[ "$TAG" != v* ]]; then
            echo "Release tag must start with v (got: $TAG)"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Checkout release tag for manual runs
        if: github.event_name == 'workflow_dispatch'
        run: |
          git fetch --tags --force
          git checkout "refs/tags/${{ steps.release.outputs.tag }}"

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Import Code Signing Certificate
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -base64 32)

          curl -o $RUNNER_TEMP/DeveloperIDG2CA.cer https://www.apple.com/certificateauthority/DeveloperIDG2CA.cer
          curl -o $RUNNER_TEMP/AppleWWDRCAG3.cer https://www.apple.com/certificateauthority/AppleWWDRCAG3.cer

          echo "$APPLE_CERTIFICATE" | base64 --decode > $RUNNER_TEMP/certificate.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          security import $RUNNER_TEMP/DeveloperIDG2CA.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security import $RUNNER_TEMP/AppleWWDRCAG3.cer -k $KEYCHAIN_PATH -T /usr/bin/codesign
          security import $RUNNER_TEMP/certificate.p12 -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

      - name: Verify signing identities
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: BBDY3ZEHGH
        run: |
          echo "APPLE_ID length: ${#APPLE_ID}"
          echo "APPLE_ID_PASSWORD length: ${#APPLE_ID_PASSWORD}"
          echo "APPLE_TEAM_ID: $APPLE_TEAM_ID"
          security find-identity -v -p codesigning

      - name: Verify tag matches package version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          if [ "v$VERSION" != "${{ steps.release.outputs.tag }}" ]; then
            echo "Tag ${{ steps.release.outputs.tag }} does not match package version v$VERSION"
            exit 1
          fi

      - name: Extract release notes
        run: |
          npm run release:notes -- "${{ steps.release.outputs.version }}" release-notes.md

      - name: Build macOS artifacts
        run: npm run package:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: BBDY3ZEHGH

      - name: Publish GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "${{ steps.release.outputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ steps.release.outputs.tag }}" \
              release/Convergence-*.dmg \
              release/Convergence-*.zip \
              release/*.blockmap \
              release/latest-mac.yml \
              --clobber
            gh release edit "${{ steps.release.outputs.tag }}" \
              --title "${{ steps.release.outputs.tag }}" \
              --notes-file release-notes.md
          else
            gh release create "${{ steps.release.outputs.tag }}" \
              release/Convergence-*.dmg \
              release/Convergence-*.zip \
              release/*.blockmap \
              release/latest-mac.yml \
              --title "${{ steps.release.outputs.tag }}" \
              --notes-file release-notes.md \
              --verify-tag
          fi
